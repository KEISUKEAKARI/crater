<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0D0D0D; display:flex; gap:2px; height:100vh; }
.swatch { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; }
.circle { width:80px; height:80px; border-radius:50%; }
.name { font-family:serif; font-size:13px; letter-spacing:0.2em; color:#888; }
.hex { font-family:monospace; font-size:11px; color:#555; }
</style>
</head>
<body>
<div class="swatch">
  <div class="circle" style="background:#BF0008;"></div>
  <div class="name">現在</div>
  <div class="hex">#BF0008</div>
</div>
<div class="swatch">
  <div class="circle" style="background:#C03A1A;"></div>
  <div class="name">朱漆</div>
  <div class="hex">#C03A1A</div>
</div>
<div class="swatch">
  <div class="circle" style="background:#A03020;"></div>
  <div class="name">錆朱</div>
  <div class="hex">#A03020</div>
</div>
<div class="swatch">
  <div class="circle" style="background:#7A2818;"></div>
  <div class="name">弁柄</div>
  <div class="hex">#7A2818</div>
</div>
</body>
</html>
