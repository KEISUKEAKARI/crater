<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KV 対角フェード サンプル</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; }

  .kv {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: hidden;
    isolation: isolate; /* mix-blend-mode を外に漏らさない */
  }

  .kv-slide {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    opacity: 0;
    z-index: 0;
  }

  .kv-slide.active {
    opacity: 1;
    z-index: 1;
  }

  /* --wipe を親から継承させて leaving と entering を同期させる */
  @property --wipe {
    syntax: '<percentage>';
    initial-value: -90%;
    inherits: true;
  }

  /* .kv.transitioning に --wipe アニメーションをかける */
  .kv.transitioning {
    --wipe: -90%;
    animation: wipe-move 5.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }

  @keyframes wipe-move {
    to { --wipe: 200%; }
  }

  /* 前の画像：右上→左下方向に消えていく（逆マスク） */
  .kv-slide.leaving {
    z-index: 1;
    opacity: 1;
    mask-image: linear-gradient(
      -45deg,
      transparent calc(var(--wipe) - 120%),
      black var(--wipe)
    );
    -webkit-mask-image: linear-gradient(
      -45deg,
      transparent calc(var(--wipe) - 120%),
      black var(--wipe)
    );
  }

  /* 新しい画像：左上→右下方向に現れる + screen合成で色が混じり合う */
  .kv-slide.entering {
    opacity: 1;
    z-index: 2;
    mix-blend-mode: screen;
    mask-image: linear-gradient(
      -45deg,
      black calc(var(--wipe) - 120%),
      transparent var(--wipe)
    );
    -webkit-mask-image: linear-gradient(
      -45deg,
      black calc(var(--wipe) - 120%),
      transparent var(--wipe)
    );
  }

  /* ドットナビ */
  .kv-nav {
    position: absolute;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    z-index: 10;
  }

  .kv-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
    border: none;
    cursor: pointer;
    transition: background 0.3s;
  }

  .kv-dot.active {
    background: #fff;
  }
</style>
</head>
<body>

<div class="kv" id="kv">
  <div class="kv-slide active" style="background-image: url('https://picsum.photos/seed/shrine1/1600/900')"></div>
  <div class="kv-slide" style="background-image: url('https://picsum.photos/seed/forest2/1600/900')"></div>
  <div class="kv-slide" style="background-image: url('https://picsum.photos/seed/japan3/1600/900')"></div>
</div>

<div class="kv-nav" id="kvNav"></div>

<script>
  const kv = document.getElementById('kv');
  const slides = document.querySelectorAll('.kv-slide');
  const nav = document.getElementById('kvNav');
  let current = 0;
  let isAnimating = false;
  const DURATION = 5500;
  const INTERVAL = 10000;

  slides.forEach((_, i) => {
    const dot = document.createElement('button');
    dot.className = 'kv-dot' + (i === 0 ? ' active' : '');
    dot.addEventListener('click', () => goTo(i));
    nav.appendChild(dot);
  });

  function goTo(next) {
    if (isAnimating || next === current) return;
    isAnimating = true;

    const prev = current;
    current = next;

    nav.querySelectorAll('.kv-dot').forEach((d, i) => {
      d.classList.toggle('active', i === current);
    });

    // 親に transitioning を付けて --wipe を同期アニメーション
    slides[prev].classList.add('leaving');
    slides[next].classList.add('entering');

    // アニメーションをリセットしてから再付与
    kv.classList.remove('transitioning');
    void kv.offsetWidth; // reflow
    kv.classList.add('transitioning');

    setTimeout(() => {
      kv.classList.remove('transitioning');
      slides[prev].classList.remove('active', 'leaving');
      slides[next].classList.remove('entering');
      slides[next].classList.add('active');
      isAnimating = false;
    }, DURATION);
  }

  setInterval(() => {
    goTo((current + 1) % slides.length);
  }, INTERVAL);
</script>

</body>
</html>
