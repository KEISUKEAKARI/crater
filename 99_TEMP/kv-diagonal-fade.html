<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KV 対角フェード サンプル</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; }

  .kv {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: hidden;
    isolation: isolate;
  }

  @property --wipe {
    syntax: '<percentage>';
    initial-value: -90%;
    inherits: true;
  }

  .kv-slide {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    opacity: 0;
    z-index: 0;
  }

  .kv-slide.active {
    opacity: 1;
    z-index: 1;
  }

  /* 両方に screen を当てて色が本気で混ざる */
  .kv-slide.leaving {
    z-index: 1;
    opacity: 1;
    mix-blend-mode: screen;
    mask-image: linear-gradient(
      -45deg,
      transparent calc(var(--wipe) - 160%),
      black var(--wipe)
    );
    -webkit-mask-image: linear-gradient(
      -45deg,
      transparent calc(var(--wipe) - 160%),
      black var(--wipe)
    );
  }

  .kv-slide.entering {
    opacity: 1;
    z-index: 2;
    mix-blend-mode: screen;
    mask-image: linear-gradient(
      -45deg,
      black calc(var(--wipe) - 160%),
      transparent var(--wipe)
    );
    -webkit-mask-image: linear-gradient(
      -45deg,
      black calc(var(--wipe) - 160%),
      transparent var(--wipe)
    );
  }

  /* ドットナビ */
  .kv-nav {
    position: absolute;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    z-index: 10;
  }

  .kv-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
    border: none;
    cursor: pointer;
    transition: background 0.3s;
  }

  .kv-dot.active { background: #fff; }
</style>
</head>
<body>

<div class="kv" id="kv">
  <div class="kv-slide active" style="background-image: url('https://picsum.photos/seed/shrine1/1600/900')"></div>
  <div class="kv-slide" style="background-image: url('https://picsum.photos/seed/forest2/1600/900')"></div>
  <div class="kv-slide" style="background-image: url('https://picsum.photos/seed/japan3/1600/900')"></div>
</div>

<div class="kv-nav" id="kvNav"></div>

<script>
  const kv = document.getElementById('kv');
  const slides = document.querySelectorAll('.kv-slide');
  const nav = document.getElementById('kvNav');
  let current = 0;
  let isAnimating = false;

  const DURATION = 5800;   // アニメーション時間（ms）
  const INTERVAL = 10000;  // 切り替え間隔（ms）
  // 最初は速く・そのあとゆっくり減速
  const EASING = 'cubic-bezier(0.05, 0, 0.15, 1)';

  slides.forEach((_, i) => {
    const dot = document.createElement('button');
    dot.className = 'kv-dot' + (i === 0 ? ' active' : '');
    dot.addEventListener('click', () => goTo(i));
    nav.appendChild(dot);
  });

  function goTo(next) {
    if (isAnimating || next === current) return;
    isAnimating = true;

    const prev = current;
    current = next;

    nav.querySelectorAll('.kv-dot').forEach((d, i) => {
      d.classList.toggle('active', i === current);
    });

    slides[prev].classList.add('leaving');
    slides[next].classList.add('entering');

    // Web Animations API で --wipe を親要素に直接アニメーション
    // → クラス削除時のリセット問題がなくなる
    const anim = kv.animate(
      [{ '--wipe': '-90%' }, { '--wipe': '200%' }],
      { duration: DURATION, easing: EASING, fill: 'forwards' }
    );

    anim.onfinish = () => {
      // マスクを外してからアニメーションを削除（チラつき防止）
      slides[prev].classList.remove('leaving');
      slides[next].classList.remove('entering');
      slides[prev].classList.remove('active');
      slides[next].classList.add('active');
      anim.cancel(); // fill:forwards を解除して --wipe をリセット
      isAnimating = false;
    };
  }

  setInterval(() => {
    goTo((current + 1) % slides.length);
  }, INTERVAL);
</script>

</body>
</html>
