<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Font Preview</title>

<!-- ▼ここのテキストを変えるだけで確認テキストが変わる -->
<script>
  const BRAND   = '金の時';        // ブランド名（日本語）
  const BRAND_EN = 'Golden Moments'; // ブランド名（英語）
  const TAGLINE  = '輝きは、準備から始まる。'; // タグライン
  const TAGLINE_EN = 'Brilliance begins with preparation.';
  const BODY_TEXT  = '加賀の地で育まれた金時草。自然の恵みを、毎日の習慣に。';
</script>

<!-- フォント候補 -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?
  family=Noto+Serif+JP:wght@400;500;700
  &family=Shippori+Mincho:wght@400;500;700
  &family=Zen+Old+Mincho:wght@400;700
  &family=Shippori+Antique
  &family=EB+Garamond:ital,wght@0,400;0,500;1,400
  &family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400
  &family=Playfair+Display:ital,wght@0,400;0,700;1,400
  &family=Libre+Baskerville:ital,wght@0,400;0,700;1,400
  &family=Crimson+Pro:ital,wght@0,400;0,600;1,400
  &family=Noto+Sans+JP:wght@300;400
  &display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#F5F2EC; font-family:'Noto Sans JP',sans-serif; color:#2C2C2C; padding:40px; }

h1 { font-size:11px; letter-spacing:0.4em; color:#9A7B2E; text-transform:uppercase; margin-bottom:8px; }
.note { font-size:11px; color:#888; margin-bottom:40px; line-height:1.8; }

.section-title {
  font-size:10px; letter-spacing:0.3em; text-transform:uppercase;
  color:#B8B3A8; border-bottom:1px solid #E4E0D8; padding-bottom:8px;
  margin:48px 0 24px;
}

.combos { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:2px; }

.combo {
  background:#fff;
  padding:32px 28px;
  cursor:pointer;
  border:2px solid transparent;
  transition:border-color 0.2s;
}
.combo:hover { border-color:#9A7B2E; }
.combo.selected { border-color:#9A7B2E; background:#FDFAF5; }

.combo-num { font-size:9px; letter-spacing:0.3em; color:#B8B3A8; margin-bottom:16px; }

.c-brand    { font-size:36px; font-weight:500; line-height:1.1; margin-bottom:6px; }
.c-tagline  { font-size:14px; font-weight:400; margin-bottom:12px; line-height:1.6; }
.c-brand-en { font-size:13px; letter-spacing:0.3em; margin-bottom:12px; color:#9A7B2E; }
.c-tagline-en { font-size:12px; margin-bottom:16px; line-height:1.7; color:#5C5956; }
.c-body     { font-size:11px; font-weight:300; color:#5C5956; line-height:2; font-family:'Noto Sans JP',sans-serif; border-top:1px solid #E4E0D8; padding-top:12px; }

.font-name  { font-size:9px; letter-spacing:0.2em; color:#B8B3A8; margin-top:14px; }

/* 選択ボタン */
.select-btn {
  display:inline-block; margin-top:12px;
  font-size:9px; letter-spacing:0.2em; text-transform:uppercase;
  background:#2C2C2C; color:#FAF7F2;
  padding:6px 14px; border-radius:20px; cursor:pointer;
  border:none; font-family:'Noto Sans JP',sans-serif;
}
</style>
</head>
<body>

<h1>Font Preview</h1>
<p class="note">
  クリックで選択。気に入ったら「No.○ で」と言えばブランドボードに反映します。<br>
  テキストはHTMLの先頭の BRAND / TAGLINE を変更してください。
</p>

<div class="section-title">日本語 serif × 英語 serif（候補）</div>
<div class="combos" id="combos"></div>

<script>
const combos = [
  { num:'01', jp:'Noto Serif JP',       en:'EB Garamond',         note:'現在使用中' },
  { num:'02', jp:'Shippori Mincho',     en:'Cormorant Garamond',  note:'やわらかな格調' },
  { num:'03', jp:'Shippori Mincho',     en:'EB Garamond',         note:'やわらかさ × クラシック' },
  { num:'04', jp:'Zen Old Mincho',      en:'EB Garamond',         note:'古典的・力強い' },
  { num:'05', jp:'Zen Old Mincho',      en:'Playfair Display',    note:'古典 × モダン高級' },
  { num:'06', jp:'Noto Serif JP',       en:'Cormorant Garamond',  note:'安定 × エレガント' },
  { num:'07', jp:'Noto Serif JP',       en:'Playfair Display',    note:'安定 × モダン' },
  { num:'08', jp:'Shippori Antique',    en:'Cormorant Garamond',  note:'レトロ × 繊細' },
  { num:'09', jp:'Zen Old Mincho',      en:'Crimson Pro',         note:'古典 × 読みやすい' },
  { num:'10', jp:'Shippori Mincho',     en:'Libre Baskerville',   note:'やわらか × 堅実' },
];

const container = document.getElementById('combos');
combos.forEach(c => {
  const div = document.createElement('div');
  div.className = 'combo';
  div.innerHTML = `
    <div class="combo-num">No.${c.num} &nbsp;—&nbsp; ${c.note}</div>
    <div class="c-brand" style="font-family:'${c.jp}',serif;">${BRAND}</div>
    <div class="c-tagline" style="font-family:'${c.jp}',serif;">${TAGLINE}</div>
    <div class="c-brand-en" style="font-family:'${c.en}',serif;">${BRAND_EN}</div>
    <div class="c-tagline-en" style="font-family:'${c.en}',serif;">${TAGLINE_EN}</div>
    <div class="c-body">${BODY_TEXT}</div>
    <div class="font-name">JP: ${c.jp} &nbsp;/&nbsp; EN: ${c.en}</div>
    <button class="select-btn" onclick="select(this, '${c.num}', '${c.jp}', '${c.en}')">Select</button>
  `;
  container.appendChild(div);
});

function select(btn, num, jp, en) {
  document.querySelectorAll('.combo').forEach(el => el.classList.remove('selected'));
  btn.closest('.combo').classList.add('selected');
  alert(`No.${num} を選択\nJP: ${jp}\nEN: ${en}\n\n「No.${num} で」とクロコに伝えてください。`);
}
</script>

</body>
</html>
