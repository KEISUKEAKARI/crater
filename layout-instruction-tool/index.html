<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>レイアウト指示ツール</title>
    <script>
        // CSSキャッシュ回避
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = 'styles.css?v=' + Date.now();
        document.head.appendChild(link);
    </script>
</head>
<body>
    <div class="app">
        <!-- 左：キャンバス -->
        <div class="canvas-panel">
            <div class="panel-header">
                <h2>レイアウト</h2>
                <button class="btn" onclick="app.reset()">リセット</button>
            </div>
            <div class="canvas" id="canvas">
                <p class="canvas-empty">右からセクションをドラッグしてください</p>
            </div>
        </div>

        <!-- 右：セクション一覧 -->
        <div class="sections-panel">
            <div class="panel-header">
                <h2>セクション</h2>
            </div>
            <div class="sections-list" id="sectionsList">
                <!-- セクション画像がここに表示される -->
            </div>
        </div>
    </div>

    <script>
        // キャッシュ回避のためapp.jsを動的に読み込み
        const s = document.createElement('script');
        s.src = 'app.js?v=' + Date.now();
        document.body.appendChild(s);
    </script>
</body>
</html>
