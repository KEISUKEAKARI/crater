<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>尾山神社 - ヘッダー + KV</title>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #1a1a1a;
      --serif: 'Shippori Mincho', 'Yu Mincho', serif;
      --sans: 'Noto Sans JP', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--sans);
      font-weight: 300;
      overflow-x: hidden;
    }

    /* ===========================
       ヘッダー
       =========================== */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      height: 72px;
      background: rgba(26, 26, 26, 0.95);
    }

    .header-logo {
      font-family: var(--serif);
      font-size: 1.125rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      color: #fff;
    }

    .header-nav {
      display: flex;
      gap: 40px;
    }

    .header-nav a {
      font-size: 0.8125rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      color: rgba(255, 255, 255, 0.85);
      text-decoration: none;
    }

    /* ===========================
       メインビジュアル
       =========================== */
    .mv {
      position: relative;
      width: 100%;
      height: 100vh;
      min-height: 600px;
      overflow: hidden;
      background: linear-gradient(135deg, #1a3a3a 0%, #2d4f4f 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .mv-content {
      position: relative;
      z-index: 2;
      text-align: center;
      color: #fff;
    }

    .mv-catch {
      font-family: var(--serif);
      font-size: 0.8125rem;
      font-weight: 400;
      letter-spacing: 0.5em;
      margin-bottom: 24px;
      color: rgba(255, 255, 255, 0.8);
    }

    .mv-title {
      font-family: var(--serif);
      font-size: clamp(2.5rem, 7vw, 4.5rem);
      font-weight: 500;
      letter-spacing: 0.25em;
      line-height: 1.3;
      color: #fff;
    }

    /* ===========================
       レスポンシブ
       =========================== */
    @media (max-width: 768px) {
      .header {
        padding: 0 24px;
        height: 60px;
      }

      .header-nav {
        display: none;
      }

      .header-logo {
        font-size: 1rem;
      }

      .mv {
        min-height: 400px;
      }

      .mv-title {
        font-size: clamp(1.5rem, 5vw, 3rem);
      }
    }
  </style>
</head>
<body>
  <!-- ナビゲーション -->
  <header class="header">
    <a href="#" class="header-logo">尾山神社</a>
    <nav class="header-nav">
      <a href="#about">由緒</a>
      <a href="#prayer">祈祷</a>
      <a href="#omamori">授与品</a>
      <a href="#access">交通</a>
    </nav>
  </header>

  <!-- メインビジュアル -->
  <section class="mv">
    <div class="mv-content">
      <p class="mv-catch">加賀百万石の守護</p>
      <h1 class="mv-title">尾山神社</h1>
    </div>
  </section>
</body>
</html>
